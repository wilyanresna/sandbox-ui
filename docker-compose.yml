version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: canvas-ui-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web_mockup_sandbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_mockup_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
